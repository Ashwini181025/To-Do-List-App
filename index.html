<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate To-Do App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Ultimate To-Do List</h1>

<button onclick="toggleDarkMode()" class="dark-btn">🌙 Dark Mode</button>

<div class="input-section">
<input type="text" id="taskInput" placeholder="Enter task">
<select id="priority">
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>
<input type="time" id="reminder">
<button onclick="addTask()">Add</button>
</div>

<input type="text" id="searchInput" placeholder="Search..." onkeyup="searchTask()">

<div class="progress">
<div id="progressBar"></div>
</div>

<ul id="taskList"></ul>

<button onclick="clearTasks()" class="clear-btn">Clear All</button>

</div>

<script src="script.js"></script>
</body>
</html>
